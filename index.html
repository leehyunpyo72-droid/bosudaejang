<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보수대장</title>
<style>
body{margin:0;font-family:sans-serif}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:40px}
.card{position:relative;cursor:pointer}
.card img{width:100%;height:200px;object-fit:cover}
.overlay{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.6);color:#fff;padding:10px}
.detail{display:none;padding:40px}
.active{display:block}
</style>
</head>
<body>

<!-- 메인 -->
<div class="grid">
  <div class="card" onclick="show('d1')"><img src="photo1.png"><div class="overlay">고무칩 복층포장</div></div>
  <div class="card" onclick="show('d2')"><img src="photo2.png"><div class="overlay">고무칩 단층포장</div></div>
  <div class="card" onclick="show('d3')"><img src="photo3.png"><div class="overlay">폴리우레탄</div></div>
</div>

<!-- 상세 -->
<div id="d1" class="detail">
<h2>고무칩 복층포장</h2>
<img src="photo11.png" width="300">
<img src="photo12.png" width="300">
</div>

<div id="d2" class="detail">
<h2>고무칩 단층포장</h2>
<img src="photo14.png" width="300">
<img src="photo15.png" width="300">
</div>

<div id="d3" class="detail">
<h2>폴리우레탄</h2>
<img src="photo17.png" width="300">
<img src="photo18.png" width="300">
</div>

<script>
function show(id){
 document.querySelectorAll('.detail').forEach(d=>d.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
