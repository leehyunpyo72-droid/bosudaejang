<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>보수대장</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
<div id="app"></div>

<script>

const detailPages = [
  {
    slug: 'rubber-double',
    title: '고무칩 복층포장',
    subtitle: '어린이 놀이터 등',
    hero: './photo1.png',
    summary: '탄성포장 보수 공법입니다.',
    points: ['충격 흡수','안전성'],
    painPoints: ['균열','들뜸'],
    solutions: ['부분보수'],
    process: ['확인','시공'],
    beforeAfter: [
      { before: './before1.jpg', after: './after1.jpg' }
    ],
    processImages: ['./process1.jpg'],
    applications: ['놀이터'],
    cta: '문의 바랍니다.'
  }
];

function detailView(d){
return `
<div>
<h1>${d.title}</h1>
<p>${d.summary}</p>
</div>
`;
}

function homeView(){
return `
<div>
<h1>보수대장</h1>
${detailPages.map(p=>`
<div onclick="openDetail('${p.slug}')">${p.title}</div>
`).join('')}
</div>
`;
}

function render(){
  const hash = location.hash.replace('#','');
  if(hash.startsWith('detail/')){
    const slug = hash.replace('detail/','');
    const d = detailPages.find(x=>x.slug===slug);
    app.innerHTML = detailView(d);
  }else{
    app.innerHTML = homeView();
  }
}

function openDetail(slug){
  location.hash = 'detail/' + slug;
}

window.addEventListener('hashchange', render);
render();

</script>
</body>
</html>
