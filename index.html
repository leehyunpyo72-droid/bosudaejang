      function getHomeSectionFromHash(hash) {
        const sectionIds = ['home', 'company', 'products', 'photos', 'colorchart', 'library', 'estimate'];
        return sectionIds.includes(hash) ? hash : 'home';
      }
      function scrollToSection(sectionId) {
        const target = document.getElementById(sectionId);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function render() {
        const hash = window.location.hash.replace('#', '');
        const app = document.getElementById('app');

        if (hash.startsWith('detail/')) {
          const slug = hash.replace('detail/', '');
          const detail = detailPages.find(item => item.slug === slug);
          app.innerHTML = detail ? detailView(detail) : homeView();
          window.scrollTo({ top: 0, behavior: 'auto' });
          return;
        }

        const sectionId = getHomeSectionFromHash(hash);
        app.innerHTML = homeView();

        if (!hash || hash === 'home') {
          window.scrollTo(0, 0);
        } else {
          setTimeout(() => scrollToSection(sectionId), 100);
        }
      }

      function openDetail(slug) { window.location.hash = `detail/${slug}`; }
      function goHome() { window.location.hash = 'home'; }
      function goSection(id) { window.location.hash = id; }
      function openLightbox(slug, index) {
        const detail = detailPages.find(item => item.slug === slug);
        if (!detail) return;
        lightboxImages = detail.images.map((src, i) => ({ src, alt: `${detail.title} ${i + 1}` }));
        lightboxIndex = index;
        renderLightbox();
      }
      function openStandaloneLightbox(index) {
        const images = ['./case_01.png', './case_02.png', './case_03.png', './case_04.png', './case_05.png', './case_06.png'];
        lightboxImages = images.map((src, i) => ({ src, alt: `이미지 ${i + 1}` }));
        lightboxIndex = index;
        renderLightbox();
      }
      function renderLightbox() {
        closeLightbox();
        if (!lightboxImages.length) return;
        const current = lightboxImages[lightboxIndex];
        const overlay = document.createElement('div');
        overlay.id = 'lightbox-overlay';
        overlay.className = 'fixed inset-0 z-[100] flex items-center justify-center bg-black/85 px-4';
        overlay.innerHTML = `
          <div class="relative w-full max-w-5xl">
            <button onclick="closeLightbox()" class="absolute -top-12 right-0 z-10 text-white font-bold">닫기 ✕</button>
            <div class="overflow-hidden rounded-3xl bg-white">
              <img src="${current.src}" alt="${current.alt}" class="max-h-[80vh] w-full object-contain bg-slate-100" />
              <div class="flex items-center justify-between p-5">
                <button onclick="moveLightbox(-1)" class="font-bold text-slate-800">이전</button>
                <div class="text-sm font-bold text-slate-500">${current.alt}</div>
                <button onclick="moveLightbox(1)" class="font-bold text-slate-800">다음</button>
              </div>
            </div>
          </div>`;
        overlay.onclick = (e) => { if (e.target === overlay) closeLightbox(); };
        document.body.appendChild(overlay);
        document.body.style.overflow = 'hidden';
      }
      function moveLightbox(direction) {
        if (!lightboxImages.length) return;
        lightboxIndex = (lightboxIndex + direction + lightboxImages.length) % lightboxImages.length;
        renderLightbox();
      }
      function closeLightbox() {
        const overlay = document.getElementById('lightbox-overlay');
        if (overlay) overlay.remove();
        document.body.style.overflow = '';
      }
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
      });
      window.addEventListener('hashchange', render);
      render();
    </script>
