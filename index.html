<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보수대장</title>
  <style>
    body {margin:0;font-family:sans-serif;}
    .section{padding:40px;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .card{cursor:pointer;position:relative;border-radius:12px;overflow:hidden}
    .card img{width:100%;height:180px;object-fit:cover}
    .overlay{position:absolute;bottom:0;background:rgba(0,0,0,0.6);color:#fff;width:100%;padding:10px}
    .detail{display:none;padding:40px;background:#f5f5f5}
    .active{display:block}
  </style>
</head>
<body>

<!-- 메인 -->
<section class="section">
  <h1>보수대장</h1>
  <div class="grid">
    <div class="card" onclick="openDetail('d1')">
      <img src="photo1.png"><div class="overlay">고무칩 복층포장</div>
    </div>
    <div class="card" onclick="openDetail('d2')">
      <img src="photo2.png"><div class="overlay">고무칩 단층포장</div>
    </div>
    <div class="card" onclick="openDetail('d3')">
      <img src="photo3.png"><div class="overlay">폴리우레탄</div>
    </div>
  </div>
</section>

<!-- 상세 영역 -->
<div id="d1" class="detail">
  <h2>고무칩 복층포장</h2>
  <img src="photo11.png" loading="lazy" width="300">
  <img src="photo12.png" loading="lazy" width="300">
  <p>놀이터 안전 바닥 시공</p>
</div>

<div id="d2" class="detail">
  <h2>고무칩 단층포장</h2>
  <img src="photo13.png" loading="lazy" width="300">
  <img src="photo14.png" loading="lazy" width="300">
  <p>산책로 및 보행로 시공</p>
</div>

<div id="d3" class="detail">
  <h2>폴리우레탄 체육시설</h2>
  <img src="photo15.png" loading="lazy" width="300">
  <img src="photo16.png" loading="lazy" width="300">
  <p>운동장 및 체육시설 바닥</p>
</div>

<script>
function openDetail(id){
  document.querySelectorAll('.detail').forEach(d=>d.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:document.getElementById(id).offsetTop,behavior:'smooth'});
}
</script>

</body>
</html>
